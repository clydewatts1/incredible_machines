<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irish Farmland Background Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-6 text-center">
        <h1 class="text-2xl font-bold mb-2 text-gray-800">Irish Farmland Generator</h1>
        <p class="text-gray-600 mb-6 text-sm">Generate distinct, stylized Irish farmland backgrounds with rolling hills and stone walls to give your levels a unique theme!</p>
        
        <div class="mb-4 text-left">
            <label for="colorSelect" class="block text-gray-700 font-bold mb-2">Select Theme/Mood:</label>
            <select id="colorSelect" class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                <option value="lush green">Lush Spring (Vibrant Green)</option>
                <option value="misty grey">Misty Morning (Soft Grey)</option>
                <option value="golden autumn">Autumn Harvest (Golden/Orange)</option>
                <option value="twilight blue">Twilight (Deep Blue)</option>
                <option value="warm sunset">Sunset (Soft Pink/Orange)</option>
            </select>
        </div>

        <button id="genBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition w-full mb-4">
            Generate Background
        </button>
        
        <div id="loading" class="hidden flex flex-col items-center mb-4">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-600 mb-2"></div>
            <p class="text-green-600 font-semibold text-sm">Generating AI image... This may take a moment.</p>
        </div>
        
        <div id="error" class="hidden mb-4 text-red-500 text-sm bg-red-50 p-3 rounded border border-red-200"></div>
        
        <div id="imageContainer" class="hidden flex flex-col items-center">
            <img id="resultImage" class="rounded shadow-md mb-4 max-w-full border border-gray-200" alt="Generated Background">
            <a id="downloadLink" download="background.jpeg" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition w-full text-center cursor-pointer">
                Download Image
            </a>
        </div>
    </div>

    <script>
        document.getElementById('genBtn').addEventListener('click', async () => {
            const btn = document.getElementById('genBtn');
            const colorSelect = document.getElementById('colorSelect').value;
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const imageContainer = document.getElementById('imageContainer');
            const resultImage = document.getElementById('resultImage');
            const downloadLink = document.getElementById('downloadLink');

            // Reset UI
            btn.disabled = true;
            btn.classList.add('opacity-50');
            loading.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            imageContainer.classList.add('hidden');

            const apiKey = ""; // The execution environment provides the key at runtime
            const promptText = `A beautiful ${colorSelect} themed background featuring rolling Irish farmlands, traditional stone walls, and scattered sheep. Suitable for a 2D puzzle game background. Seamless, gentle painted art style, ample negative space in the center so game objects are clearly visible.`;

            try {
                let attempt = 0;
                let result = null;
                const maxRetries = 5;
                const delays = [1000, 2000, 4000, 8000, 16000];

                // Exponential Backoff implementation
                while (attempt < maxRetries) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                instances: { prompt: promptText },
                                parameters: { sampleCount: 1 }
                            })
                        });

                        if (!response.ok) {
                            throw new Error(`Generation failed (Status: ${response.status})`);
                        }
                        
                        result = await response.json();
                        break; 
                    } catch (e) {
                        attempt++;
                        if (attempt >= maxRetries) throw e;
                        await new Promise(resolve => setTimeout(resolve, delays[attempt - 1]));
                    }
                }

                // Extract base64 image data
                const base64Data = result?.predictions?.[0]?.bytesBase64Encoded;
                
                if (base64Data) {
                    const imgUrl = `data:image/jpeg;base64,${base64Data}`;
                    resultImage.src = imgUrl;
                    
                    // Format download name based on selected color
                    const safeColorName = colorSelect.replace(/ /g, '_');
                    downloadLink.download = `irish_farmland_${safeColorName}_bg.jpeg`;
                    downloadLink.href = imgUrl;
                    
                    imageContainer.classList.remove('hidden');
                } else {
                    throw new Error("No image data found in the generated response.");
                }

            } catch (err) {
                errorDiv.textContent = `Error: ${err.message}. Please try again.`;
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
