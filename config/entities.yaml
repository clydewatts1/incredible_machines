    texture_path: ""

variants:
  bouncy_ball:
    template: "Circle"
    label: "Bouncy Ball"
    key_bind: "1"
    friction: 0.3
    elasticity: 0.9
    radius: 15
    mass: 1.0
    collision_sound: "bounce.wav"

  long_ramp:
    template: "Rectangle"
    label: "Long Ramp"
    key_bind: "2"
    friction: 0.8
    elasticity: 0.2
    width: 240
    height: 10
    is_static: True
    texture_path: "assets/images/wood_grain_oak.png"

  red_diamond:
    template: "Diamond"
    label: "Red Diamond"
    key_bind: "3"
    width: 40
    height: 40
    mass: 50.0
    is_static: True
    color: [255, 0, 0]

  half_circle:
    template: "Half-Circle"
    label: "Half Circle"
    key_bind: "4"
    radius: 50
    segments: 15
    mass: 5.0
    is_static: True
    color: [0, 200, 200]

  quarter_circle:
    template: "Quarter-Circle"
    label: "Quarter Circle"
    key_bind: "5"
    radius: 50
    segments: 15
    is_static: True
    mass: 5.0
    color: [200, 200, 0]

  textured_rectangle:
    template: "Rectangle"
    label: "Textured Rectangle"
    key_bind: "6"
    width: 60
    height: 60
    is_static: True
    texture_path: "assets/images/wood_texture.png"


  square_block:
    template: "Square"
    label: "Square Block"
    key_bind: "6"
    width: 20
    height: 20
    is_static: True
    elasticity: 0.5
    texture_path: "assets/images/wood_texture.png"


  bounce_block:
    template: "Square"
    label: "Bounce Block"
    key_bind: "6"
    width: 20
    height: 20
    is_static: True
    elasticity: 1.2
    texture_path: "assets/images/wood_texture.png"


  shoot_block:
    template: "Square"
    label: "Shoot Block"
    key_bind: "7"
    width: 20
    height: 20
    is_static: True 
    elasticity: 4
    texture_path: "assets/images/rivets_01.png"


  cannon:
    template: "Rectangle"
    label: "Cannon"
    width: 60
    height: 30
    is_static: True
    active_side: "right"
    exit_velocity: 800.0
    exit_angle: 0.0
    shoot_frequency: 1.0
    max_count: 10
    ammo_id: "bouncy_ball"
    texture_path: ""


  basket:
    template: "Rectangle"
    label: "Basket"
    width: 80
    height: 60
    is_static: True
    active_sides: ["top"]
    accepts_types: ["bouncy_ball"]
    texture_path: ""

  conveyor_belt:
    template: "Rectangle"
    label: "Conveyor Belt"
    width: 120
    height: 20
    is_static: True
    speed: 100.0
    direction: "right"
    color: [100, 100, 100]

  motor:
    template: "Circle"
    label: "Motor"
    radius: 30
    is_static: False
    motor_speed: 3.14
    direction: "clockwise"
    color: [200, 100, 50]
