    spawn_sound: "spawn.wav"
    texture_path: ""
  UShape:
    friction: 0.5
    elasticity: 0.5
    mass: 1.0
    collision_sound: "default_collision.wav"
    spawn_sound: "spawn.wav"
    texture_path: ""
  Rectangle:
    friction: 0.5
    elasticity: 0.5
    mass: 1.0
    collision_sound: "default_collision.wav"
    spawn_sound: "spawn.wav"
    texture_path: ""
  Circle:
    friction: 0.5
    elasticity: 0.5
    mass: 1.0
    collision_sound: "default_collision.wav"
    spawn_sound: "spawn.wav"
    texture_path: ""
  Diamond:
    friction: 0.5
    elasticity: 0.5
    mass: 1.0
    collision_sound: "default_collision.wav"
    spawn_sound: "spawn.wav"
    texture_path: ""
  Half-Circle:
    friction: 0.5
    elasticity: 0.5
    mass: 1.0
    collision_sound: "default_collision.wav"
    spawn_sound: "spawn.wav"
    texture_path: ""
  Quarter-Circle:
    friction: 0.5
    elasticity: 0.5
    mass: 1.0
    collision_sound: "default_collision.wav"
